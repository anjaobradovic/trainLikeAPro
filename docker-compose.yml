version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fitness_db
      POSTGRES_USER: fitness_user
      POSTGRES_PASSWORD: fitness_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fitness_user:fitness_pass@db:5432/fitness_db
      - SECRET_KEY=super-secret-key-za-development
      - DEBUG=True
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - EMAIL_USE_TLS=False
      - DEFAULT_FROM_EMAIL=noreply@likeapro.local
    depends_on:
      - db
      - mailhog

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3030:3030"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - PORT=3030
    depends_on:
      - backend

volumes:
  postgres_data: